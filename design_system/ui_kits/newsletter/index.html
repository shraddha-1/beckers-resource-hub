<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Becker's Daily — Newsletter Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="kit.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Newsletter.jsx"></script>
<script type="text/babel" data-presets="react">
function App() {
  return (
    <div className="nl-page">
      <NewsletterMasthead date="Thursday, April 23, 2026" />
      <NewsletterHero
        title="8 systems restructuring C-suites in 2026"
        body="From Advocate Health to Sutter, leadership teams are consolidating finance, clinical, and digital functions under fewer direct reports. Here's what changed this quarter."
      />
      <NewsletterSection title="Top Headlines">
        <NewsletterItem kicker="Transactions & Valuation" title="Arkansas system inks 2nd hospital acquisition in 5 weeks" summary="Baptist Health reached a definitive agreement to acquire Magnolia Regional Medical Center." />
        <NewsletterItem kicker="Financial Management" title="Providence's physician chief on its 'holistic' approach to value-based care" />
        <NewsletterItem kicker="Pharmacy" title="Mark Cuban wants to bring drug manufacturing to hospitals' doorsteps — literally" />
        <NewsletterItem kicker="Executive Moves" title="UCI Health names chief AI officer" />
      </NewsletterSection>
      <NewsletterSection title="Most Read">
        <NewsletterItem kicker="Compensation" title="Highest-earning execs at HCA, Tenet, UHS and CHS" />
        <NewsletterItem kicker="Finance" title="Days cash on hand at 50 health systems" />
        <NewsletterItem kicker="Workforce" title="7 physician specialties see pay drops" />
      </NewsletterSection>
      <NewsletterSection title="Upcoming Event">
        <NewsletterItem kicker="Apr 13 – 16, 2026 · Hyatt Regency Chicago" title="16th Annual Meeting" summary="Four days of executive sessions across leadership, finance, clinical, and IT tracks." />
      </NewsletterSection>
      <NewsletterFooter />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
