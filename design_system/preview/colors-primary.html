<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 2px; overflow: hidden; border: 1px solid var(--bh-gray-200); }
  .chip { height: 72px; }
  .lbl { padding: 8px 10px; background: #fff; }
  .name { font-size: 12px; font-weight: 600; color: var(--color-fg); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); margin-top: 2px; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:12px;">BRAND / NAVY · The identity color. Logo, icons, nav, footer, inverse surfaces.</div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#061733"></div><div class="lbl"><div class="name">navy-900</div><div class="hex">#061733</div></div></div>
    <div class="sw"><div class="chip" style="background:#091F3E"></div><div class="lbl"><div class="name">navy-800 ★</div><div class="hex">#091F3E</div></div></div>
    <div class="sw"><div class="chip" style="background:#122A54"></div><div class="lbl"><div class="name">navy-700</div><div class="hex">#122A54</div></div></div>
    <div class="sw"><div class="chip" style="background:#1E3A6D"></div><div class="lbl"><div class="name">navy-600</div><div class="hex">#1E3A6D</div></div></div>
    <div class="sw"><div class="chip" style="background:#2E4D86"></div><div class="lbl"><div class="name">navy-500</div><div class="hex">#2E4D86</div></div></div>
  </div>
</div></body></html>
