<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row3 { display:flex; gap:20px; align-items: flex-end; flex-wrap: wrap; }
  .tile { background: var(--bh-navy-800); }
  .c { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); margin-top:6px; text-align:center; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); text-align:center; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:14px;">SPACING · 4px base, multiples only. Primary steps.</div>
  <div class="row3">
    <div><div class="tile" style="width:4px;height:32px;"></div><div class="c">sp-1</div><div class="v">4</div></div>
    <div><div class="tile" style="width:8px;height:32px;"></div><div class="c">sp-2</div><div class="v">8</div></div>
    <div><div class="tile" style="width:12px;height:32px;"></div><div class="c">sp-3</div><div class="v">12</div></div>
    <div><div class="tile" style="width:16px;height:32px;"></div><div class="c">sp-4</div><div class="v">16</div></div>
    <div><div class="tile" style="width:20px;height:32px;"></div><div class="c">sp-5</div><div class="v">20</div></div>
    <div><div class="tile" style="width:24px;height:32px;"></div><div class="c">sp-6</div><div class="v">24</div></div>
    <div><div class="tile" style="width:32px;height:32px;"></div><div class="c">sp-7</div><div class="v">32</div></div>
    <div><div class="tile" style="width:40px;height:32px;"></div><div class="c">sp-8</div><div class="v">40</div></div>
    <div><div class="tile" style="width:56px;height:32px;"></div><div class="c">sp-9</div><div class="v">56</div></div>
    <div><div class="tile" style="width:72px;height:32px;"></div><div class="c">sp-10</div><div class="v">72</div></div>
    <div><div class="tile" style="width:96px;height:32px;"></div><div class="c">sp-11</div><div class="v">96</div></div>
  </div>
</div></body></html>
