<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row3 { display:flex; gap:24px; align-items: center; flex-wrap: wrap; }
  .shape { width:80px; height:60px; background: var(--bh-navy-800); border:1px solid var(--bh-navy-700); }
  .c { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); margin-top:6px; text-align:center; }
  .n { font-family: var(--font-sans); font-size:12px; font-weight:600; text-align:center; margin-top:8px; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:14px;">RADII · Largely square. Pills for tags, nothing bigger than 8px on cards.</div>
  <div class="row3">
    <div><div class="shape" style="border-radius:0"></div><div class="n">none</div><div class="c">0</div></div>
    <div><div class="shape" style="border-radius:2px"></div><div class="n">xs</div><div class="c">2</div></div>
    <div><div class="shape" style="border-radius:4px"></div><div class="n">sm ★</div><div class="c">4</div></div>
    <div><div class="shape" style="border-radius:6px"></div><div class="n">md</div><div class="c">6</div></div>
    <div><div class="shape" style="border-radius:8px"></div><div class="n">lg</div><div class="c">8</div></div>
    <div><div class="shape" style="border-radius:999px"></div><div class="n">pill</div><div class="c">tags</div></div>
  </div>
</div></body></html>
