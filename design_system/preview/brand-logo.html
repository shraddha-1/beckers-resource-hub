<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .wrap { display:flex; align-items:center; gap: 28px; padding: 6px 0; }
  .logo { height: 44px; }
  .stack { display:flex; flex-direction:column; gap: 4px; }
  .tag { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--bh-gray-700); }
  .swatch-strip { display:flex; height: 24px; margin-top: 4px; border: 1px solid var(--bh-gray-200); }
  .swatch-strip > * { flex:1; }
  .triad { background: var(--bh-navy-800); color:#fff; padding: 20px 28px; font-family: var(--font-serif); font-size: 22px; font-weight: 700; letter-spacing: .02em; display:flex; gap:18px; align-items: center; border-radius: 2px; }
  .triad .sep { color: var(--bh-red-600); font-weight: 400; }
  .triad .small { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: .16em; color: var(--bh-ice-200); text-transform: uppercase; display:block; margin-bottom:4px; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:12px;">LOGO + TAGLINE LOCK-UP · Swatch strip pairs with the wordmark on brand collateral.</div>
  <div class="wrap">
    <img class="logo" src="../assets/logos/beckers-hospital-review-logo.png" alt="Becker's Hospital Review" />
  </div>
  <div class="swatch-strip" style="margin-top:14px;">
    <div style="background:#091F3E"></div>
    <div style="background:#1E3A6D"></div>
    <div style="background:#9A1B2A"></div>
    <div style="background:#D3DEED"></div>
    <div style="background:#F5F8FC"></div>
    <div style="background:#FFFFFF"></div>
  </div>
  <div class="triad" style="margin-top: 14px;">
    Professional <span class="sep">·</span> Trusted <span class="sep">·</span> Engaging
  </div>
</div></body></html>
