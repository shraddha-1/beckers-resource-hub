<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .tags { display:flex; gap:8px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag { display:inline-block; padding: 3px 10px; font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 999px; }
  .tag-red { background: var(--bh-red-800); color: #fff; }
  .tag-navy { background: var(--bh-navy-800); color: #fff; }
  .tag-ice { background: var(--bh-ice-100); color: var(--bh-navy-800); }
  .tag-outline { background: #fff; color: var(--bh-red-800); border: 1px solid var(--bh-red-800); }
  .kickers { display:flex; gap:18px; flex-wrap:wrap; }
  .kicker { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--bh-red-800); }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:12px;">TAGS + KICKERS · Tags are pill-shape. Kickers are plain uppercase text, always red.</div>
  <div class="tags">
    <span class="tag tag-red">Featured</span>
    <span class="tag tag-navy">New</span>
    <span class="tag tag-ice">Sponsored</span>
    <span class="tag tag-outline">Members Only</span>
  </div>
  <div class="kickers">
    <span class="kicker">Executive Moves</span>
    <span class="kicker">Health IT</span>
    <span class="kicker">Financial Management</span>
    <span class="kicker">Transactions &amp; Valuation</span>
  </div>
</div></body></html>
