<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .lbl { font-family: var(--font-sans); font-size:13px; font-weight:600; color: var(--color-fg); }
  .inp { padding: 10px 12px; border: 1px solid var(--bh-gray-300); border-radius: 4px; font-family: var(--font-sans); font-size:14px; background:#fff; }
  .inp:focus { outline: none; border-color: var(--bh-navy-800); box-shadow: 0 0 0 3px rgba(154, 27, 42, 0.25); }
  .help { font-size:12px; color: var(--color-fg-subtle); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .news { background: var(--bh-ice-050); border: 1px solid var(--bh-ice-200); padding: 14px; border-radius: 4px; margin-top: 6px; display:flex; gap:8px; }
  .news input { flex: 1; padding: 9px 10px; border: 1px solid var(--bh-gray-300); border-radius: 4px; font-family: var(--font-sans); font-size:14px; }
  .news button { padding: 9px 18px; background: var(--bh-red-800); color: #fff; border: 0; border-radius: 4px; font-weight: 600; font-size: 14px; font-family: var(--font-sans); cursor:pointer; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:10px;">FORM CONTROLS · Newsletter email input is the archetypal pattern.</div>
  <div class="row">
    <div class="field">
      <div class="lbl">Work email</div>
      <input class="inp" placeholder="name@system.org" />
      <div class="help">Used for subscription confirmation.</div>
    </div>
    <div class="field">
      <div class="lbl">Title</div>
      <input class="inp" value="Chief Medical Officer" />
    </div>
  </div>
  <div class="news">
    <input placeholder="Email address" />
    <button>Subscribe Today</button>
  </div>
</div></body></html>
