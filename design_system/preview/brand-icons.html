<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap: 10px; padding: 16px 8px; background: var(--bh-ice-050); border-radius: 4px; }
  .cell img { width: 40px; height: 40px; }
  .lbl { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--bh-navy-800); }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:12px;">ICONOGRAPHY · House icons, navy fill, filled-geometric style. Lucide fills are the substitution set for anything missing.</div>
  <div class="grid">
    <div class="cell"><img src="../assets/icons/events.svg" alt="" /><div class="lbl">Events</div></div>
    <div class="cell"><img src="../assets/icons/webinars.svg" alt="" /><div class="lbl">Webinars</div></div>
    <div class="cell"><img src="../assets/icons/whitepapers.svg" alt="" /><div class="lbl">Whitepapers</div></div>
    <div class="cell"><img src="../assets/icons/podcasts.svg" alt="" /><div class="lbl">Podcasts</div></div>
  </div>
</div></body></html>
