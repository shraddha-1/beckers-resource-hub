<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .event { background: var(--bh-navy-800); color: #fff; padding: 18px 20px; border-radius: 4px; max-width: 320px; }
  .event .kicker { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--bh-ice-200); }
  .event .title { font-family: var(--font-serif); font-weight: 700; font-size: 20px; line-height: 1.2; margin: 8px 0 12px; color:#fff; }
  .event .venue { font-size: 13px; color: var(--bh-ice-200); margin-bottom: 4px; }
  .event .dates { font-size: 13px; color: #fff; font-weight: 600; }
  .event .btn { margin-top: 14px; display:inline-block; padding: 8px 16px; background: var(--bh-red-800); color:#fff; border-radius: 4px; font-family: var(--font-sans); font-weight:600; font-size:13px; text-decoration: none; }
  .row { display: flex; gap: 16px; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:12px;">EVENT CARD · Deep-navy surface, ice-blue meta, red CTA. The house inverse card.</div>
  <div class="row">
    <div class="event">
      <div class="kicker">Upcoming Event</div>
      <div class="title">16th Annual Meeting</div>
      <div class="venue">Hyatt Regency Chicago</div>
      <div class="dates">Apr 13 – 16, 2026</div>
      <a class="btn">Register</a>
    </div>
    <div class="event" style="background: var(--bh-navy-900);">
      <div class="kicker">Virtual</div>
      <div class="title">Oncology Executive Summit</div>
      <div class="venue">Loews Chicago Hotel</div>
      <div class="dates">Apr 13 – 14, 2026</div>
      <a class="btn">Register</a>
    </div>
  </div>
</div></body></html>
