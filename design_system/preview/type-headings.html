<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .spec { display: grid; grid-template-columns: 1fr auto; gap: 14px 24px; align-items: baseline; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-subtle); text-align: right; white-space: nowrap; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:14px;">HEADING SCALE · PT Serif Bold across H1–H4.</div>
  <div class="spec">
    <div style="font-family:var(--font-serif); font-weight:700; font-size:44px; line-height:1.15;">Heading 1</div>
    <div class="tag">h1 · 44/51</div>
    <div style="font-family:var(--font-serif); font-weight:700; font-size:36px; line-height:1.2;">Heading 2</div>
    <div class="tag">h2 · 36/43</div>
    <div style="font-family:var(--font-serif); font-weight:700; font-size:30px; line-height:1.25;">Heading 3</div>
    <div class="tag">h3 · 30/38</div>
    <div style="font-family:var(--font-serif); font-weight:700; font-size:24px; line-height:1.3;">Heading 4</div>
    <div class="tag">h4 · 24/31</div>
  </div>
</div></body></html>
