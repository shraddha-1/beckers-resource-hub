<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: 2px; overflow: hidden; border: 1px solid var(--bh-gray-200); }
  .chip { height: 72px; }
  .lbl { padding: 8px 10px; background: #fff; }
  .name { font-size: 12px; font-weight: 600; color: var(--color-fg); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-subtle); margin-top: 2px; }
</style></head><body>
<div class="card">
  <div class="caption" style="margin-bottom:12px;">ACCENT / CRIMSON · Reserved for the wordmark, kickers, links, "Subscribe" CTAs. Never decorative.</div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#7A1220"></div><div class="lbl"><div class="name">red-900</div><div class="hex">#7A1220</div></div></div>
    <div class="sw"><div class="chip" style="background:#9A1B2A"></div><div class="lbl"><div class="name">red-800 ★</div><div class="hex">#9A1B2A</div></div></div>
    <div class="sw"><div class="chip" style="background:#B32437"></div><div class="lbl"><div class="name">red-700</div><div class="hex">#B32437</div></div></div>
    <div class="sw"><div class="chip" style="background:#C41E3A"></div><div class="lbl"><div class="name">red-600</div><div class="hex">#C41E3A</div></div></div>
  </div>
</div></body></html>
